body:
  text: 提要老圃集二卷别集類三宋臣等謹案老圃集二卷宋洪芻撰芻字駒父南昌人紹聖元年進士靖康中官至諫議大夫後謫沙門島以卒劉克莊後村詩話曰三洪與徐師川皆山谷之甥龜父警句往往前人所未道然早卒惜未多見駒父詩尤工陸游老學菴筆記亦極稱其竄海島詩烟波不隔還鄉夢風月猶隨過海身句蓋當時文人頗重之然芻之竄也楓忩小牘謂坐為金人括財太峻頗稱其寃今考王明清玉照新志所載則芻實於根括金銀之時入諸王邸中以勢挾內人唱歌侍酒得罪名教殆不容誅當時僅斥海濵殊為佚罰其人如是其詩本不足重輕特其學有師承深得豫章之格但以文論固不愧酷似其舅之稱録六朝人集者存沈約范雲録唐人集者存沈佺期宋之間就詩言詩片長節取亦古來著録之通例也宋史藝文志載老圃集一卷久佚不傳宋詩紀事僅從諸地志類書中捃托數篇不及百分之一惟永樂大典所載尚得一百七十首殆當時全部收入與以篇帙稍多謹釐為上下二卷以便循覽焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f45fd67092ae318b935be8f467599ececf0783215eaa7dad92a0660649c87124
