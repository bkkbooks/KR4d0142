body:
  text: 老圃集巻上宋洪芻撰五言古蓮華洞答友人蓮峯聳崔巍在眼昔未到發興空盤紆舒冩屬吟嘯五老如有情遙岑動清眺新篇下紫霄語我遊歴妙物景㑹相忘煙霞領其要坐石掬清流緣雲睨奔峭悠然俛仰間無心乃同調偕遊㑹有期山靈勿騰笑遊泐潭寺吾聞石門山對峙儼天闢林茂山自青草香澗長碧中有古招提柱栱煥青赤惟昔馬大士方墳聳遺迹龍象仰慈顔馬駒䜟前識香火有因緣窗户坐幽闃瓶錫想異時雲水飽遊歴飲波浥曹溪法雨被江國大闡選佛場法戰無兼敵我非山中人蹔着登山屐東閣嘲書淫净境酬詩癖朝渉潺湲溪暮陟崔嵬石敷牀聽犍椎鉢飯分香積山髙日易斜夢短夜分寂禪心頗靈眀俗慮詎充斥歸歟得短章投筆疥其壁政如抱布鼓豈能飛霹靂徑須倩阿香轟然聽霆擊忽傳湯休篇風騷共推激何當從君遊願飛恨無翼次子字韻呈鄭太玉斯文不可見猶欣識之子端如逃虚空而聞跫音喜歴歴海南事細話傾我耳悠悠世上情毁譽私彼已是事姑置之斯文長巳矣風味契淵明流落逾子美從来直如絃多作道邉死寄聲柳栁州未用斬曲几孤鶴行贈楊君翩翩雲中鶴来自華亭濱裵回乆乃集佇立江之濆髙歩整霜羽隻影翔秋旻豈無鴻鵠侣俛仰鷄鶩羣啄腥細流中汝食得無貧況有繒繳虞驚顧何逡廵珠庭響清唳胎仙舞祥雲胡不矯翮去来儀瑞吾君飢食玉山禾渴飲瑤池津無言九臯逺鳴隂誰不聞寄題貫時軒詩古人憩息地不種凡草木數竿何必多可以慰幽獨忘憂翫芳草怡顔眄庭柯豈無艷陽節搖落將如何彼美軒中人澹然對浮雲此君有佳處心期暗相親蕭蕭四時色目擊道逾妙君看竹得風天然向人笑因讀梅聖俞六鶴詩或令余别賦之警露皎皎蟾桂眀耿耿星斗爛清夢時時驚零露滴霄漢偉哉仙人騎從来知夜半顧歩舉趾一何髙脩頸宛回顧隻影踉蹡行眷然慕儔侣豈忘赤霄上盤桓此池籞理毛飄飄青田質歛翼在亭臯囘此碧玉喙刷我白雪毛顧影矜羽儀孔翠非其曹唳天清唳九臯内抗音薄層雲戛然時一鳴流響驚人羣嗟哉陸内史華亭無復聞舞風歸来丁令威暫别巳千年抽琴奏清角婆娑舞胎仙何必拊節和御風自泠然啄食昻昻兀兀姿朱冠垂素翎首下尻益髙裵囘我中庭俯仰鷄鶩羣啄腐復吞腥同師川過李三十九湖上宅用師川韻多書唐鄴侯藹藹盛雲來髯公頗好事相過必遲回結構平湖隂清絶無纎埃數到不知逺君家寛酒盃遶水信杖屨披靡蓬蒿開遺基訪孺子荒墳弔澹臺誅茅卜隣並茲願何當諧七松未暇種五栁徑須栽同陳虚中勸農出郊因遊眀水山寺深樹鳴鷤䳏紅紫春事休臨川賢假守只今陳太邱駕言出逺郊班春臨道周亦招素冠士来従朱轓遊晨興愜勝引適此夜雨收原隰亂髙下意行逐前儔荒荒白水滿鬱鬱稻秧抽舊聞眀水寺宛在嵒之幽石門本無關鳴禽自相求不有省耕役俗駕来何由老屋隠喬木野僧事良疇松徑深窈窕軒車紛少留遲囘動歸興衝雨戒摧輈危情極氷淵細路遵塍溝深泥艱渉足竹鷄為我愁豈憚来往頻清與耳目謀回首謝青山尋盟亦悠悠贈倪濤少府君從淮上来手持阿髯詩塵埃欣拂拭得此帶經倪珠壁豈投暗按劍有餘悲願保青雲姿勿歎黄綬卑太山駐翠輦行草封禪儀漢皇儻借問潤色非君誰我非國僑賢慙負延陵知縞帶敢虚辱贈言當紵衣次韻和鄭太玉新居荒塗負崇岡君居在其麓下與佛界連一徑通芻牧髙情慕天隨枵腹茹杞菊數椽負郭居窈窕鑿空谷憶昨歩過君窘歩侵兩足聽君亹亹談霏屑落鋸木相依方在茲凉飈蕩煩燠宴李氏園亭得慶字韻我来北斗南兩見回東柄萬斛開府愁四壁文園病誰知深巷中卉木頗幽夐大梁賢公子携酒賔亦命紅蕤巳飄零緑綺方輝映豈惟追尋遲亦苦風雨横主賔混誰何談笑雜嘲評詎知時雨靈但覺中酒聖年豐樂崇寧詩敵躡長慶況有雷陳交何必宛洛盛律管承飛灰羲和駐春令日月曾幾何佳辰我所竟芍藥殿餘春想見晨粧靚一醉觀有餘此集君其更七言古題黄稚川雲巢按豫章續志分寧縣櫻桃洞黄公凖讀書處公凖字稚川雙井人結茒于洞之巔號曰雲巢永樂大典作雅川誤雲巢一上十五里中有今世巢居子鷄鳴犬吠白雲裏不知天際去此幾平生深契鳥巢禪翦茅盖頭萬事巳宴坐經行飛鳥上人間榮辱不到耳蝸牛兩角竟何為鷦鷯一枝端自喜我有一㕓落城市章服褁狙聊復爾武溪未訪桃花源脩江儻問桃花水㑹取櫻桃洞前路藜杖扶衰従此始戲用荆公體呈黄張二君金華牧羊兒穏坐思悠哉誰人得似張公子鞭笞鸞鳳終日相追陪長夏無所為壘麴便築糟邱臺古今同一體吾人甘作心似灰南方瘴癘地鬱蒸何由開永日不可暮渴心歸去生塵埃人生㑹合安可常如何不飲令心哀張公子時相見我能㧞爾抑塞磊落之竒才只願無事常相見有底忙時不肯来松棚南山落落千尺松干雲蔽日搖青葱盤根錯節嵗月古龍吟虎嘯號悲風北山文杏中梁棟我材臃腫非世用脩枝細葉幸有餘赬肩大束那辭送承以髙竹青扶踈置君寛閑之玉除倐如亂雲駐車盖怳似廣庭張拂廬垂頭塌翼下孔翠張鱗擺鬛来鯨魚穿空入隙清飈吹疑有萬壑哀聲隨羲和按轡不馳騁炎官火傘將安施朅来投荒近循海日坐板屋如蒸炊南山蒼官憐我熱遺我七鬛千孫枝但令脩幹青青多温風烈日如予何再次洪上人雲巢韻黄子厭喧求避俗直上孤峯結茅屋欲期汗漫游九垓俯視塵寰戰蠻觸小山招隠喚不囘舊時從事有邉幅不能投筆學文鴛底用决科似張鷟自賦雲巢自髙唱手握靈蛇嗤魚目由来江夏多可人藍田片片生美玉要須青山頂上行去伴白雲簷下宿西湖窟穴對華榱肯把蘭亭比金谷板屋西戎板屋詩所錄甌閩萬里同風俗風吟日暴雨所沐巧匠引繩如觧玉谿民得之亟乗屋既輕且堅尺度足可憐童我南山木君不見曹瞞鄴下銅雀臺陶土作瓦何壯哉臺傾基平瓦尚在鑿為大研竒且瓌君不見黄州使君誇竹樓剖竹俛仰相綢繆琮琤最宜雨中聽擊考有類鳴琳球銅雀么麽何足摹籜龍燥輕易焚如不如杉屋夀且姝風雨不動何渠渠嗟予抱釁謫蠻夷如人體瓌欣解衣數椽破屋亦不惡仰見星宿相參差䲭鴞作室庇風雨鷦鷯巢林安一枝凌雲大厦鬼所窺衡門之下可棲遲黄州有竹樓王元之所作次陳州一水縈囘槖駞項百丈遙牽如簸掌鸕鷀捕魚沒復出鷺鷥行沙俯還仰白雲思我白頭親雙足未到心先往黄昏繫纜危臺邉飯糗羮藜莫惆悵五言律次李少微韻春風楊栁岸寒食杏花村對月驚生魄思人暗斷魂我閑無吏考君治有司存又作匆匆别相逢席未温次韻和王張贈别之作五言聊贈别二妙送將歸立馬然萁敏争鋒嚙鏃機日將秋共晩人與雁俱飛去住加餐飯新霜㸃客衣次師川韻與君城北寺取次對床眠坐即棊中隠時逃醉裏禪相招從白社不擬問青天但有加餐飯無田亦願年卧痾非傲世背俗信畸人無復少年事偶隨肥馬塵静便門掃軌懶任草如茵迹滯江山勝心將魚鳥親次瑛上人懐汪彦章韻君雖四禪侣自是一詩家白足濯蛟井清風振龍沙虚室無長物多文富生涯懐人有新作粲粲菖蒲花次韻師川題余荀龍壁間三首青鏡磨秋水紅衣退藕花朅来尋五栁端欲問三車濁酒休論限浮生定有涯比封千户竹鼔吹一湖蛙髙文腸是錦妙句筆生花松菊開三徑詩書載五車曲湖鄰賀監複壁笑王涯海若應憐我貽書問井蛙我来占食指客至卜燈花但祝加餐飯何勞問頰車交情真莫逆秋興浩無涯姑置人間事紛紛祗鬬蛙喜雨詩日日望南山朝隮解我顔雲垂四天外雨灑一林間枯沼微瀾動旱苗生意還慇懃祝屏翳莫為逺人慳次師川韻喜雨呈彦章綠塘深漲雨紅芰静舒花卧上三竿日晴喧兩部蛙老饕猶善飯水厄怯逢茶擬到新池畔来尋謝客家登髙能共賦好雨故催詩階草卧青軟畦苗垂綠滋夏深飛燕静秋近候蟲知寄語耽吟客可無新句為次韻和彦章池上之作二首官閑發興清水逺覺空眀玉局思無限青蘋風自生魚荷飜暮色蟬樹帶秋聲雲黒斜陽外遙知雨又晴水檻凉秋好風林初日眀屛間青嶂合鏡裏白雲生茶試旗槍色蛙添鼓吹聲痩笻聊復倚遶水歩新晴題雙林寺幽谷雙林寺荒郊得逺尋銀鈎遺墨在筆諫慕賢深徙倚千山晚坐愁三日霖枯棊圍白黒聊復費光隂潘延之挽詞肥遁攀巢許幽光燭斗牛長公辭漢世孺子隠南州閉户荒三徑紬書綜九流欲尋髙士傳端向古人求次韻和元禮湖海沙鷗性山林霧豹文龍虵争起陸羔鴈看成羣玉石無緇磷芝蘭自苾芬韓康不二價女子㑹知君容滕軒烏隼經行處蝸牛窈窕深㑹稽雖奉計彭澤自無心禪寄跏趺坐風披徙倚襟莫言容滕地不廢掉頭吟送張元幹自昔張平子愁来賦四愁行看車馬客坐覺嵗時流眀月江山夜候蟲天地秋怪君有底急不肯少遲留嘲偷兒長卿惟有壁囊槖自無錢金盡何勞攫墉疎豈待穿未能抛鼎祿猶復戀青氊梁上休驚墜飢寒亦可憐書懐北闕書休上南窗滕易安道肥知戰勝歸約己盟寒委吏無麟筆迂儒置蝨官所須升斗水肯沃鮒魚亁又和師川同集章江寺二首鹿苑江南寺龍沙城北遊脩椽雲自宿返照雨還収禪麈尋支遁碁枰對奕秋還家真復樂何必逺封侯興發尋荒徑途窮見寳坊隨宜聊復飽觸處得追凉取友真濠上懐人向渭陽不嫌茶七碗殊勝酒千觴口占贈何秀才何郎閩越英疇昔昧平生邂逅同衾宿夷猶共舸行繁臺半床夢潁水一篙清俄頃膠投漆難忘此日情次韻李商老贈李少魏誅茅遲竹君拂匣見桐孫囊篋深傾倒鐘彛細討論只今仙李後好事阿髯存不厭敲門客時開炙背軒題泐潭院平生麋鹿性名山恣幽尋歴盡嵓壑奥始聞鐘梵音中多不凋木上有自呼禽許稅俗士駕茲焉聊洗心再遊泐潭院用前韻石門乆寒盟茲遊得重尋静契祖師妙清聞山水音長閑羨老衲幽思愧鳴禽可怕移文劾沙鷗知我心次韻陳使君詠霰雪三首天幙垂雲合山屏擁雪飛楊公田種玉淵客淚成璣㸃綴添梅萼飄零亂羽衣清溪横一葉併載月眀歸蕭灑宣城守揮毫雪共飛山川映重壁咳唾鬬眀璣佳氣籠寒谷歡聲抵襲衣霜臺如不踐粉省定須歸敷床初屑屑入夜故飛飛拭處渾抛粉揉来亂擲璣銀蟾分玉照雲絮借天衣地席横陳處晨曦未得歸
