body:
  text: 老圃集巻下宋洪芻撰七言律和郭功甫題客館韻容膝柴門覺易安數椽喜枕寺東山雁飛不到吾来此燕亦知歸客未還夢斷霜鐘年欲晏愁聽蠻鼓鬢先班自公退食門長掩未必鄰僧似我閑翠嵓道人蒔貓頭竹生大筍十餘調䕶甚謹為予従者髠盜殆盡戲作長句觧嘲觸藩大筍闖猫頭竊屨真成従者山鹿恰看逢角觧籜龍端有剖胎憂因供蒲塞桑門饌殊勝渭川千戸侯飜恐癡兒癡黠半為君淨盡破除休歸自西山至黄梔港口衝雨穿雲愁去路歸雲閣雨路還通七層涌塔瞻天際三徑吾廬在眼中港轉黄梔横野艇里空白社漫春風青山送我寜辭逺流水隨人亦欲東次山谷韻妙峯宛在水中央上有荘嚴清浄坊壊衣盤礴蝸牛角法窟窈冥師子床萬象森羅一拳石千頃汪洋百谷王不減乗槎到牛女擬取支機問下方寳石峥嶸佛所廬經宿何年下清都海市樓臺湧金碧木落牖户眀江湖千波舂撞有崩態萬棟凌壓無完膚巨鼇冠山勿驚走欲尋髙處垂眀珠陪陳使君宴南山亭曉露無塵夜雨收日光穿漏趂公逰煙花淡蕩連三里雲樹低迷羃一州岡轉卧龍春色老氣横野馬夕陽愁林間新火眀雙炬歌舞南山最上頭次杜公韻杜郎得飽肥如瓠怪我秋来太瘦生時輩不應推翰墨論文時許過柴荆朋交結綬非能事身世靈丹豈易成幽徑新凉約微歩晚風含樹有蟬聲次韻李商老見懐之什一日思君劇九秋平生問事賈長頭郵傳頗恠詩来晚技癢遥憐筆不休王孫莫問投書渚芳草空迷谷鹿洲望斷西山山盡處雲居何處只空愁次韻閱道見貽之句獨来深樹初啼鳥㡬處髙枝已嘒蟬坐久毎將碁作隠晝長還覺日如年醉鄉彭澤陶元亮句法襄陽孟浩然聚散悲歡皆夢幻南柯同寄曲肱眠次李元亮韻邂逅何曽十日飲乖離細數七年遲鄼侯廟下相逢處揚子橋頭握别時猶喜夫君誦新作自憐衰病豈能詩平生流水髙山意緑綺朱絃付子期次李少微韻紫芝眉宇久不見朅来老眼快雙眀春光駘蕩遽如許詩骨崢嶸太瘦生書蠧研埃無復理鳥啼花落亦關情客兒起我風騷興敢與羊何並得名次顧子美韻幕府優㳺兼吏隠華陽真逸詎應慚定知爽氣供行路恠有新詩成立談晚日碧雲人未至西風紅樹我何堪幽懐踈豁慿佳詠飫徳餐和飽且酣次韻謝無逸送謝幼槃康樂風流鴻雁行眼中文物敢雌黄相逢草草来何暮索去匆匆作底忙尚卧東山髙謝傅亦憐白首老馮唐只應飲酒稱名士不用離騷詠九章題雙桂亭燕賀翬飛稱虎符銀鈎蠆尾映金鋪訟亭留得棠隂在月窟遙憐桂影孤故郡毎懸髙士榻新居兼愛丈人烏雕磨才思無佳語可許江山借助無將至潁上賣馬得錢買舟去抛擲紅塵泛緑波梨栗登盤黄菊晚江淮放艇白鷗多霜飛鴻雁有底急月眀烏鵲奈愁何女兒浦口渺何處且向女郎臺下過次韻和成道人山中即事二首香城髙絶剰春寒桃李青青一破顔俗子車塵隨水逺野僧心事與雲閑花従風雨飄零去寺在煙霄縹緲間往日尋源到幽處至今猶復夢潺潺沙白澄江江上山帶青百里染層巒欲尋邱壑何當往擬掛塵冠不復彈邂逅三春還徑去軒渠一笑有餘歡郢人妙質應猶在政爾揮斤斲鼻端同蘇伯固逰東山寺五里来尋祇樹園寒蟬嘒嘒葉紛紛田間壊衲僧收稻天外竒峯山作雲半榻華胥聊共寄一盂香積許同分迎人返照不無意送客殘鐘猶自聞遊東禪寺聞說巖隈閟寳坊後車無客自徜徉人如冬日熏肌暖句與宫梅觸鼻香隨蝶未容尋枕上觀魚且喜得濠梁夢魂飛過水東去落日寒山一帶長野迥亭髙眼倍眀悠悠芳草古今情酒兼賢聖醒還醉風有雌雄雨復晴嫩緑連天誰與染殘紅擲地自無聲岡回溪轉藏嵓寺歸路蕭蕭聽馬鳴又陪陳使君遊東禪寺暉暉麗日旆悠悠千騎班春古寺幽篆破髙青知野火㸃殘横緑掠沙鷗微行曲折如羊坂亂石崢嶸似虎邱暮靄餘霞趣歸興溪魚林鳥自遲留城裏芳菲盡破除更携賔従出東郛桃憑苦雨收紅糝李借風光耀雪珠碧水横隄春澹沲石門弭盖歩踟蹰細看名字蒼崖畔㸃檢而今半在無雪越犬舊聞冬吠雪閩天今見雪中梅朔風掃蕩宿霾盡苦霧驅除霽色開情共酒盃渾欲淺心隨爐炭欲成灰我来正落黄茅後茅未黄時儻得回何君挽詞萬里空悲赤壁秋九原遽有白楊愁鳳毛並作人間瑞玉潤俱従地下㳺已躍龍津隨化劒難憑夜壑覔藏舟遙知㑹葬車千兩苦雨蕭蕭迸淚流宴城上亭呈閱道山圍水遶思悠哉蹔向登臨勝處来宻坐已霑神女雨歸軒更借阿香雷笙歌入耳眉還舞郷縣牽情首重回敏㨗隨時豈無興君賢揚子我慙枚晚宴南禪寺呈使君疊前韻隔年蹔到鶯將老此日重陪燕始来雲傍熊軒飛好雨山移鼉鼓作輕雷踏青女伴春衫濕浮白賔筵舞袖回可是元暉方在郡尊前能賦媿鄒枚七夕前二夕同二僧追凉寺門髙樓傑閣對岧嶤滴露流螢夜寂寥剥啄叩門知有興従容拂榻慰無聊殿藏北斗惟看柄松礙南山不見椒乗月儻能同歩履杖藜逐我莫辭遙同師川商老追凉徐賢亭抖擻三年異域塵還將衰鬂照湖淪田田亂葉如迎客潑潑跳魚似畏人機事已忘来白鳥雄風蹔起在青蘋九原埋玉雖千載追想髙懐迹未陳送師川還龍舒灊嶽西山各滯留江頭相遇話神州送君歸去還為客破涕成歡轉復愁眀日東湖人已散朝雲南浦水空流郎官好在能乗興凖擬歸騘踏素秋送李仲特賔客願見韓荆州部曲猶思郭細侯可是孔鸞垂塌翼行看騏驥踏長楸謝公已蠟登山屐范蠡難維泛海舟當復睽離還惜别山中猶得従公逰冬日逰宣巖殺雞為黍見交情歩屨扶藜向此行剖竹取泉来滴瀝䟽巖剔藪到崢嶸一綸涵碧磻溪釣千穗垂黄谷口耕白水青山應笑我抗塵走俗媿平生次友逰宣巖韻攀躋来借一枝笻幽討深行極半峯路側似逢居士屩嵗寒空老大夫松林間突兀森蹲虎門外坡陀偃卧龍引水作簾真酷似㳙㳙初不異秋冬謝楊崇送酒并口味剥啄扣門驚晝夣逕知酒客寄新詩官醅濃潑鴨頭緑雕俎香蒸牛尾狸黄雀披綿為誰好青州従事與君期真成爛醉頽然卧兎走烏飛了不知再用前韻答李商老江南暮春鶯亂飛平章風物憶邱遲蒼苔寂歴荒三徑緑樹扶踈又一時漢隂丈人少機事草堂先生能寄詩交親咫尺不相見汗漫九垓那可期新樓聞說新樓冠舊名國人縦觀一城傾層甍迥出晴空外羙景還將樂事并潭底魚龍驚倒影梁間燕雀賀前楹他年秋夜堪乗興小坐匡床待月生次元禮題余詩巻後韻異域三秋百感生愁腸一日九回縈每聽足音聊粲笑蹔教覓句觧憂酲従来魯衞如兄弟頗覺何劉謾舅甥勝䖏欣然真得計文窮詩痩祗空名次韻徐師川喜余来還之作謫去蹔經牛斗分歸来重賦豫章行鴒原悽㫁手足戚隴水悲傷甥舅情半世問津今老大一邱散髪得生平長卿句法鋒難犯隠若䝉公萬里城次曽元禮韻卧龍山下阿蘭若漠漠烟城楚水西肯共扶笻同散歩来尋負郭慰卑棲曲肱睡稳門常掩促膝談深日已低他日相過如卜晝南窓就我共羮藜席上次張法曺韻山城臈月盛江梅底用花奴羯鼓催宻炬暗隨殘漏盡氷肌巧鬪一枝開已聞珠貫停檀板未許葱根近玉盃多謝主人能卜晝幽花未落更重来寄楊崇索酒重九遥思楊執㦸菊花滿地漫龍沙欲作山中醉千日不送蒲州酒一車秋至苦吟如促織書成滿紙似昏鴉蜀江儻有南来鯉莫寄盧仝七椀茶宿翠巖寺呈馬彦若徐師川不到翠巖如許久朅来聊復破春愁已聞髙士徐孺子更約平生馬少游夣裏鐘聲驚客枕静中玉子落紋楸非關風雨留連我要作山間十日留萬松亭用蘇黄舊韻夾道蒼官似異時峩峩冠劒想秦儀雲垂車盖尋前路風作濤聲入舊枝故作虬龍驚俗眼不妨霜雪弄妍姿難追急景遼天鶴無復當年校尉詩聞東湖上荷花盛開畏觸熱未得往五賢祠下古城隅一昔来逰儼畵圖傳道荷花映荷葉只今東湖連北湖想見波間浮屬玉誰撑艇子入菰蒲欲將鼻觀偷香去火傘炎官不貸吾示子太學何蕃久不歸十年甘㫖誤庭闈休辭客路三千逺須念人生七十稀腰下雖無蘇子印箧中幸有老莱衣歸期定約春前後免使髙堂賦式微還張閱道文編只今天下張公子邂逅論文得琢磨顧我筆端無綺麗愛君胷次粲星羅囁嚅元白何勞壓卓犖曹劉不啻過魚目碔砆空自愧敢將光價敵隋和題雲居寺詩雙澗逺輸功徳水四山深閟法王家曲肱聊寄吉祥卧緩帶来嘗安樂茶亦有同行木上座初無引路鹿啣花孤峰頂上却歸去回首冥冥雲霧遮寄贈王允歎楚俗禨祥古所尤迎神簫鼓沸香湫真成娶婦諛河伯亦有韓生笑沐猴毁校可無東里子斬巫誰是左黄州詎知恤緯非嫠事白屋何妨肉食謀潘子真用慳字韻勸香城人葺陳陶書堂因和之一宿層城飯香積六年清鏡改朱顔陳陶仙去書堂壊羅幙塵生春晝閑毎向山頭望城裏直疑天上非人間可能分我尋常地抺月批風想不慳泠泠野水翛翛寺矗矗髙峰疊疊巒閑伴禽魚宜石友静聞山水奏清彈難招靈觀追陳跡好在湯休接古歡開士未應文士後病夫端欲避三端呈潘延之丈黒頭異日掛冠歸親植杉松見百圍閑過一生従古少兼全五福似公稀手抄萬巻筆猶健身倚孤笻行若飛寄語輕鷗莫驚顧南州髙士已忘機呈彦章塞翁失馬吾何有濠上觀魚每自慙探袖空漫禰衡刺叩門徑就阿戎談但思濁酒同元亮底用清談學仲堪回首世間皆苦累蟻封蝸角戰方酣次韻和南山即事呈使君鳥啼花落奈春何謾道春光特地多不見餳簫寒食後暫陪觴詠惠風和竹衫争醉豐年日瓦鼓仍聞載路歌五馬来嘶莫愁雨滿堂冠弁共峩峩再用前韻呈閱道抱關擊柝何為哉田園将蕪歸去来雄辯接公如豁霧清狂誚我作顛雷顛如雷見南史朋歡巳許膠投漆光價無容賜望回欲整羸師聊一戰知君豈復事鄒枚次韻和人詠雙葉蓮花盡紅銷子結房並垂荷葉是何祥風吹嫋嫋能浮盖雨打田田更發香盪槳可無雙舴艋照波不羡兩鴛鴦恠来下客詩濤涌知有騷人為濫觴飲汪彦章池閣見龍掛避暑追凉許近尋君家池閣爽煩襟宻雲不雨龍掛尾落葉辭風蟬噪林許逺清灣淨如拭沒多紅芰意能深圍棋爭道未得去遮莫城頭西日沉次韻閱道見貽地偏袖舞長沙窄心逺胷通夢澤寛遽失比隣秋屋静稍親燈火夜窓寒乗雲妙在思黄鶴寫韻遥知有彩鸞四海弟兄傾意氣鴻妻莱婦有餘歡贈張道聖曲江忠藎藹前修晚嵗差池恨未休鼻祖聲名髙嶺海耳孫詩禮尚風流眼中韶石還家夢客裏西山脫葉秋示我開元餘翰墨懐賢撫事却成愁同師川至李氏涵虚閣闌暑追凉得佳處筍輿乗興入蒿蓬乍停西嶺三秋雨得借東湖一曲風江上帆檣来雉堞波間荷芰沒鳬翁後車孺子賢孫在弔古徘徊返照紅人日偶逢人日强裁詩身在異鄉多所思天氣暖如寒食後桃花酷似暮春時溪毛入饌光浮筯雲子新炊滑溜匙㪷酒百錢能得醉儻尋佳處一伸眉五言絶句悠然齋可到羲皇上不離方丈間初無盈把菊盡日對南山六言絶句臨川即事峴臺著色山水南湖罨畵池塘欲買浮家泛宅箇中端坐迷藏覔句翻經靈運臨池學書右軍誰知麻源三谷頓有一雙玉人廟有魯公遺像堂餘玉茗髙華零落銀鈎欲折摩挲螭首興嗟七言絶句次陳使君韻三首釀雨濃雲鬱不開絳英素蘂半蒼苔不因皂盖班春去誰喚青衫老吏来循吏三年借冦君賔筵春事一畨新中山自可銷千日河朔寜湏泥十旬暖日和風似酒醺提壺鳥語苦淹人傳聞已有𤓰時代誰與東山管轄春道中即事八首五日塵沙十日泥杜䳌苦勸不如歸蹔来還去雲相似我亦無心出岫飛十年不踏闗山道千里来尋長短亭煙水照人頭欲白雲峯見我眼猶青兠羅輸桞㡬多緜獨繭抽絲颺逺天買㫁殘春是榆荚亂抛無數沈郎錢筍輿沙路裌衣輕小雨斑斑落又晴三月盡頭穿嶺去萬松隂裏踏莎行春風嶺上春風顛杜䳌花下啼杜䳌花開花落春事晚歸歟當及秋風前萬里将雛西北飛江淮倒景弄差池雲天空濶稻粱少却羡鷦鷯巢一枝穿雲髙入雙峰寺投壁難追四祖禪香積喜逢蒲塞饌拂床聊寄吉祥眼三月東風池上頭魚龍漫沒戲仙舟我来稅駕亦未晚後乗儻追公子逰偶成翻經靈運推不去愛酒淵眀挽不来無復種蓮人作社空餘寫影佛成臺戲酒官吏部甕間應爛醉淵眀籬下祗空盃徑湏道士常持滿拉取青州従事来次韻和張掾新泉三絶句北山石竇冽寒泉森木清隂拱外堧試酌祇園八功徳醍醐灌頂想欣然水之美者三危露邂逅清甘一勺同兩客携茶煑湯鼎歸来應御玉川風山色何如水色幽碁聲不亂葉聲愁斧柯未爛君歸去白日桑榆不我謀従璉長老借書折軸南来書五車韋編具葉映窓紗老禪不用鑚故紙借與書生遮眼花䟦橘帖二首蘇州句法追彭澤九日題詩興有餘可是門生藏橘帖不勞博物見新書右軍一字價連城斷簡殘章尚典型坐獲驪珠三十九絶勝辛苦賺蘭亭戲余天申十年不見君如許一日相逢我便傾結綬合為金馬客裁詩巳至玉谿生賈誼洛陽推最少相如蜀郡更多才異書且覔金樓子俊采空歸玉鏡臺席上口占和使君韻二首皂盖朱轓駐水濵芳菲雖晚景猶新何妨綺席三千履不負陽春十二旬鶯歌蝶舞更紅裙端與東山作主人竹馬兒童扶杖老爭隨千騎去行春松棚先人手種一川松為棟為梁似未中只合茅齋聴驅使為公六月喚清風或遺揚州芍藥者用元韻二首似與風光殿後塵亭亭紅艷逺看人既能障下嫣然笑移取雷塘十里春可堪春恨似悲秋把酒驅愁轉益愁飛盡桞花憐逐客始知春色到汀洲次韻絶句子猷愛竹真成癖愛菊淵眀懶是真籬下想通三徑入林間誰許七賢親戲答王雍臨池端欲寫黄庭籠贈鵞羣重有情我亦年来無復殺不應恠我太憎生中秋戲趙公子南國佳人翠自顰西山爽氣我相親只應此夜團團月偏照寒窓獨宿人茶花萬卉千葩畵不如芬芳合比白雲腴應慿巧絶傳神筆幻出江南沒骨圖局中即事用壁間韻老屋踈牕窈窕深鋪松縳竹作清隂數竿風篠天然笑惟有此君知我心無人盡日鳥關關只許清風伴我閑縦復思歸歸未得婆娑詩酒破愁顔始年四十二首門換桃符官落拓酒傳婪尾嵗侵尋朱顔已逐年華改祗有胷中不動心學詩未後髙常侍獻賦猶先杜拾遺摘句捜章終底用求田問舎悔全遲曽内相以絶句詩還予詩巻和其韻五首梅生養性来關市賈傅隳官弔汨羅敢過雷門誇布鼓輙將魚目換隋和月旦平生精藻鑑短章七字粲星羅銀鈎蠆尾争輝媚豈減蘭亭叙永和紫微光燄垂星斗内相詞華麗蜀羅願乞金丹換凡骨坐令文物壓元和李膺此世龍門坂得士初非一目羅牛鐸黄鍾或同調豈無宫徴配鸞和世味着人濃似酒交情向我薄於羅古今混混東流水聽取踏歌藍采和小桃晚發深深淺淺小桃枝苦被蠻風瘴雨欺莫恨春工開㝡晚却應孤艷落還遲東風不識桃花面惆悵多愁足病身青帝也應憐逐客小窓故剰一枝春戲贈僧庵二首海棠紅映梨花白拄杖芒鞋遶屋簷深樹提壺空好語無人沽酒送陶潜風枝雨葉春無賴石徑芳茨晝不開緑竹笋髙人未覺紫荆花謝我重来
